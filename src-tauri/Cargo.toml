[package]
name = "screenextend"
version = "1.0.0"
description = "Screen Extend"
authors = ["Sarvesh Madullapalli"]
edition = "2021"
categories = ["gui", "os", "network-programming", "multimedia"]
keywords = ["screen-mirror", "desktop-extension", "multi-display", "offline", "free"]
license-file = "LICENSE"
repository = "https://github.com/EpicCodeWizard/ScreenExtend"
homepage = "https://screen-extend.tech/"
documentation = "https://screen-extend.tech/docs/"
# readme — Path to the package’s README file.

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[build-dependencies]
tauri-build = { version = "1.5", features = [] }

[dependencies]
tauri = { version = "1.5", features = [ "clipboard-write-text", "shell-open" ] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
lazy_static = "1.4.0"
pnet = "0.34.0"
local-ip-address = "0.5.7"
rand = "0.3"
winapi = { version = "0.3", features = ["iphlpapi"] }

[dependencies.windows]
version = "0.44.0"
features = [
    "Data_Xml_Dom",
    "Devices_Enumeration",
    "Devices_WiFiDirect",
    "Foundation",
    "Foundation_Collections",
    "Networking",
    "Security_Credentials",
    "Win32_Foundation",
    "Win32_Security",
    "Win32_System_Threading",
    "Win32_UI_WindowsAndMessaging",
]

[features]
custom-protocol = ["tauri/custom-protocol"]
