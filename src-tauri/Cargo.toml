[package]
name = "screenextend"
version = "1.0.0"
description = "Screen Extend"
authors = ["Sarvesh Madullapalli"]
edition = "2021"
categories = ["gui", "os", "network-programming", "multimedia"]
keywords = ["screen-mirror", "desktop-extension", "multi-display", "offline", "free"]
#documentation — URL of the package documentation.
#readme — Path to the package’s README file.
#homepage — URL of the package homepage.
#repository — URL of the package source repository.
#license — The package license.
#license-file — Path to the text of the license.

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[build-dependencies]
tauri-build = { version = "1.5", features = [] }

[dependencies]
tauri = { version = "1.5", features = [ "clipboard-write-text", "shell-open" ] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
lazy_static = "1.4.0"
pnet = "0.34.0"
local-ip-address = "0.5.7"

[dependencies.windows]
version = "0.44.0"
features = [
    "Data_Xml_Dom",
    "Devices_Enumeration",
    "Devices_WiFiDirect",
    "Foundation",
    "Foundation_Collections",
    "Networking",
    "Security_Credentials",
    "Win32_Foundation",
    "Win32_Security",
    "Win32_System_Threading",
    "Win32_UI_WindowsAndMessaging",
]

[features]
custom-protocol = ["tauri/custom-protocol"]
