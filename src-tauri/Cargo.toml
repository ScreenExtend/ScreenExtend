[package]
name = "screenextend"
version = "1.0.0"
description = "ScreenExtend"
authors = ["Sarvesh Madullapalli"]
edition = "2021"
categories = ["gui", "os", "network-programming", "multimedia"]
keywords = ["screen-mirror", "desktop-extension", "multi-display", "offline", "free"]
license-file = "../LICENSE"
repository = "https://github.com/ScreenExtend/ScreenExtend"
homepage = "https://screenextend.app/"
documentation = "https://screenextend.app/docs/"
# readme — Path to the package’s README file.

[lib]
name = "screenextend_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["unstable", "specta"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri-specta = { version = "=2.0.0-rc.21", features = ["derive", "typescript"] }
specta-typescript = "0.0.9"
specta = "=2.0.0-rc.22"
elevated-command = "1.1"
driver-ipc = { path = "C:/Users/sarve/fleet/virtual-display-rs/rust/driver-ipc" }
tokio = { version = "1", features = [ "full" ] }
tauri-plugin-shell = "2"
tauri-plugin-clipboard-manager = "2"
tauri-plugin-cli = "2"
tauri-plugin-http = "2"
tauri-plugin-store = "2"
tauri-plugin-os = "2"
wmi = "0.17.2"
rand = "0.9.1"
tauri-plugin-dialog = "2"
fs4 = { version = "0.13", features = ["sync"] }
# scopeguard = "1.2.0"
# notify = "8.0.0"
# futures = "0.3.31"
# reqwest = { version = "0.12", features = ["json", "blocking"] }
# anyhow = "1.0.98"

[dependencies.windows]
version = "0.61.3"
features = [
    "Data_Xml_Dom",
    "Devices_Enumeration",
    "Devices_WiFiDirect",
    "Foundation",
    "Foundation_Collections",
    "Networking",
    "Networking_Connectivity",
    "Networking_NetworkOperators",
    "Security_Credentials",
    "Win32_Foundation",
    "Win32_Security",
    "Win32_System_Threading",
    "Win32_UI_WindowsAndMessaging",
    "Win32_NetworkManagement_IpHelper",
    "Win32_Networking_WinSock",
    "Win32_System_Com",
    "Win32_System_Ole",
    "Win32_UI_Shell",
]
